<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark cyber background -->
  <rect width="32" height="32" rx="6" fill="#020408"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="16" x2="32" y2="16" stroke="#00ff41" stroke-width="0.2" opacity="0.2"/>
  <line x1="16" y1="0" x2="16" y2="32" stroke="#00ff41" stroke-width="0.2" opacity="0.2"/>
  <!-- Corner brackets -->
  <path d="M3 8 L3 3 L8 3" fill="none" stroke="#00ff41" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <path d="M29 8 L29 3 L24 3" fill="none" stroke="#00ff41" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <path d="M3 24 L3 29 L8 29" fill="none" stroke="#00ff41" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <path d="M29 24 L29 29 L24 29" fill="none" stroke="#00ff41" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <!-- H letter -->
  <text x="5.5" y="22" font-family="monospace" font-size="14" font-weight="900" fill="#00ff41" filter="url(#glow)">H</text>
  <!-- G letter -->
  <text x="16" y="22" font-family="monospace" font-size="14" font-weight="900" fill="#00f0ff" filter="url(#glow2)">G</text>
  <!-- Glow filter green -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur2"/>
      <feMerge><feMergeNode in="blur2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>
